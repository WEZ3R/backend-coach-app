version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fitflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coaching_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: fitflow-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/coaching_app
      JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
      NODE_ENV: development
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
